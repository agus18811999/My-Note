<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSpace | Enterprise Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] } } } }
    </script>

    <style>
        /* ==========================================
           1. BACKGROUND ETHEREAL AURORA (BERGERAK)
           ========================================== */
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 50%, #ffecd2 100%);
            background-size: 300% 300%;
            animation: auroraBG 15s ease infinite alternate;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        @keyframes auroraBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
/* CUSTOM SUCCESS ICON SWEETALERT */
.custom-swal-success-icon {
    width: 90px !important;
    height: 90px !important;
    border: 4px solid #ccebb5 !important;
    border-radius: 50% !important;
    color: #a5dc86 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 42px !important;
    margin: 2.5em auto 0.6em auto !important;
    box-sizing: border-box !important;
}

.custom-swal-success-icon i {
    margin: 0 !important;
    padding: 0 !important;
    line-height: 1 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
}
        /* ==========================================
           2. TEMA KACA (GLASSMORPHISM)
           ========================================== */
        .glass-sidebar { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 5px 0 25px rgba(31, 38, 135, 0.05); }
        .glass-header { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.4); }
        .glass-column { background: rgba(255, 255, 255, 0.25); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 1.5rem; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.9); transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(99,102,241,0.15); border-color: #6366f1; }
        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8); transition: all 0.3s; }
        .glass-input:focus { background: rgba(255, 255, 255, 0.9); outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        /* MENU AKTIF SIDEBAR */
        .menu-active { background: linear-gradient(90deg, rgba(99, 102, 241, 0.15) 0%, transparent 100%); border-left: 4px solid #6366f1; color: #4338ca; font-weight: 700; }
        .menu-active i { color: #6366f1; }

        /* SCROLLBAR PREMIUM */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.6); }

        .swal2-popup { border-radius: 24px !important; background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(20px) !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="workspaceApp()" x-init="initApp()">

  <!-- Tambahkan md:relative md:translate-x-0 agar permanen di Laptop -->
  <aside class="glass-sidebar w-72 h-full flex flex-col z-50 shrink-0 transition-transform duration-300 fixed inset-y-0 left-0 md:relative md:translate-x-0" :class="isSidebarOpen ? 'translate-x-0 shadow-2xl md:shadow-none' : '-translate-x-full'">
        
        <div class="p-6 border-b border-white/50 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-fuchsia-500 rounded-xl flex items-center justify-center shadow-lg text-white font-bold text-lg shrink-0">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="overflow-hidden">
                    <h2 class="font-extrabold text-slate-800 text-sm tracking-wide truncate">OmniSpace</h2>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold truncate">Workspace</p>
                </div>
            </div>
            <button @click="isSidebarOpen = false" class="md:hidden text-slate-500 hover:text-rose-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <div class="px-5 py-4 border-b border-white/30 shrink-0 bg-white/10">
            <div @click="showOnlineModal = true" class="flex items-center justify-between cursor-pointer group bg-white/50 hover:bg-white/80 border border-white/60 rounded-xl p-2 transition-all duration-300 shadow-sm">
                <div class="flex -space-x-2 overflow-hidden px-1">
                    <template x-for="ou in onlineUsers.slice(0, 4)" :key="ou.id">
                        <div :class="ou.color" class="inline-flex h-6 w-6 rounded-full text-white font-extrabold text-[9px] items-center justify-center ring-2 ring-white relative hover:z-20 hover:-translate-y-1 transition-transform cursor-help shadow-sm" :title="ou.name" x-text="ou.initial"></div>
                    </template>
                    <div x-show="onlineUsers.length > 4" class="inline-flex h-6 w-6 rounded-full bg-slate-200 text-slate-600 font-extrabold text-[9px] items-center justify-center ring-2 ring-white relative z-0">
                        <span x-text="'+' + (onlineUsers.length - 4)"></span>
                    </div>
                </div>
                
                <div class="flex items-center gap-1.5 pr-1 shrink-0">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_5px_#10b981]"></span>
                    <span class="text-[9px] font-extrabold text-slate-500 uppercase tracking-widest group-hover:text-indigo-600 transition-colors" x-text="onlineUsers.length + ' Aktif'"></span>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-5 px-3 space-y-6" style="scrollbar-width: none;">
            <template x-for="(group, gIndex) in menuGroups" :key="gIndex">
                <div>
                    <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest px-3 mb-2.5" x-text="group.category"></h3>
                    <ul class="space-y-1">
                        <template x-for="item in group.items" :key="item.tabName">
                            <li>
                                <button @click="switchFeature(item); isSidebarOpen = false" :class="activeFeature.tabName === item.tabName ? 'menu-active' : 'text-slate-600 hover:bg-white/40'" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all text-left group">
                                    
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        <i :class="item.icon" class="w-5 text-center text-slate-400 group-hover:text-indigo-500 transition-colors shrink-0"></i>
                                        <span x-text="item.title" class="truncate"></span>
                                    </div>

                                    <div class="flex -space-x-1.5 shrink-0 ml-2">
                                        <template x-for="ou in onlineUsers.filter(u => u.location === item.tabName && u.id !== (user.idUser || mySessionId))" :key="ou.id">
                                            <div :class="ou.color" class="w-4 h-4 rounded-full text-white flex items-center justify-center text-[7px] font-extrabold ring-1 ring-white shadow-sm animate-bounce" :title="ou.name + ' sedang melihat ini'" x-text="ou.initial"></div>
                                        </template>
                                    </div>

                                </button>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>
        </nav>

        <div class="p-4 border-t border-white/40 mt-auto shrink-0 bg-white/10">
            <div @click="isProfileModalOpen = true" class="bg-white/40 border border-white/60 p-3 rounded-2xl flex items-center gap-3 cursor-pointer hover:bg-white/70 transition-all shadow-sm group">
                
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-fuchsia-500 flex items-center justify-center text-white font-bold shadow-inner shrink-0 overflow-hidden border-2 border-white">
                    <template x-if="userProfile.avatar">
                        <img :src="userProfile.avatar" @error="userProfile.avatar = ''" class="w-full h-full object-cover">
                    </template>
                    <template x-if="!userProfile.avatar">
                        <span x-text="userProfile.namaLengkap ? userProfile.namaLengkap.charAt(0).toUpperCase() : 'U'"></span>
                    </template>
                </div>
                
                <div class="flex flex-col overflow-hidden flex-1">
                    <span class="text-xs font-extrabold text-slate-800 truncate" x-text="userProfile.namaLengkap"></span>
                    <span class="text-[10px] font-bold text-slate-500 truncate" x-text="userProfile.posisi"></span>
                </div>
                
                <i class="fa-solid fa-gear text-slate-400 group-hover:text-indigo-600 transition-colors text-sm animate-spin-slow"></i>
            </div>
            
            <button class="w-full mt-2 text-[10px] font-extrabold text-rose-500 hover:text-rose-600 hover:bg-rose-50 py-2 rounded-xl transition-colors uppercase tracking-widest flex justify-center items-center gap-2">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
            </button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        
      <!-- ========================================== -->
        <!-- HEADER UTAMA (RESPONSIF MOBILE & DESKTOP)  -->
        <!-- ========================================== -->
       <header class="glass-header !h-auto min-h-[5rem] py-4 px-4 md:px-6 flex flex-wrap md:flex-nowrap items-center justify-between shrink-0 z-10 gap-4">
            
            <div class="flex items-center gap-3 md:gap-4 order-1">
                <button @click="isSidebarOpen = true" class="md:hidden text-slate-600 hover:text-indigo-600 focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div>
                    <h1 class="text-xl md:text-2xl font-extrabold text-slate-800 truncate max-w-[150px] sm:max-w-xs" x-text="activeFeature.title"></h1>
                    <p class="text-[10px] md:text-[11px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1.5 md:gap-2">
                        <i :class="activeFeature.icon" class="text-indigo-400"></i> Database 
                        <i class="fa-solid fa-chevron-right text-[8px] opacity-50"></i> 
                        <span class="truncate max-w-[100px] sm:max-w-none" x-text="activeFeature.tabName"></span>
                    </p>
                </div>
            </div>

            <div class="flex justify-center items-center gap-2.5 bg-white/50 border border-white/60 px-5 py-2.5 rounded-full shadow-[inset_0_1px_3px_rgba(255,255,255,0.8)] backdrop-blur-md order-3 md:order-2 w-full md:w-auto mt-1 md:mt-0">
                <i class="fa-regular fa-clock text-indigo-500 text-sm animate-pulse"></i>
                <span class="text-slate-600 font-extrabold text-xs tracking-wide" x-text="currentTime"></span>
            </div>
            
            <button @click="openModal('add')" class="shrink-0 bg-gradient-to-r from-indigo-600 to-fuchsia-600 hover:from-indigo-700 hover:to-fuchsia-700 text-white font-bold py-2.5 px-4 md:px-6 rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-0.5 flex items-center gap-2 text-xs md:text-sm order-2 md:order-3">
                <i class="fa-solid fa-plus"></i> 
                <span class="hidden sm:inline" x-text="'Tambah ' + activeFeature.title"></span>
                <span class="sm:hidden">Tambah</span>
            </button>

        </header>

        <div x-show="isLoading" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900/5 backdrop-blur-sm">
            <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p class="font-bold text-indigo-800 animate-pulse">Menarik Data dari Workspace...</p>
        </div>

        <div class="flex-1 overflow-y-auto p-6 lg:px-10 flex flex-col" x-show="!isLoading" style="scrollbar-width: none;">
            
           <!-- ========================================== -->
            <!-- AREA FILTER STATUS (Responsif Mobile)      -->
            <!-- ========================================== -->
            <div class="flex justify-center mt-6 md:mt-2 mb-8 px-2 w-full overflow-hidden shrink-0">
                <div class="bg-white/40 border border-white/60 p-1.5 rounded-full shadow-sm backdrop-blur-md max-w-full">
                    <div class="flex items-center gap-1 overflow-x-auto hide-scrollbar" style="scrollbar-width: none; -ms-overflow-style: none;">
                        <template x-for="status in activeFeature.boardStatuses" :key="status">
                            <button @click="activeStatusFilter = status"
                                    :class="activeStatusFilter === status ? getFeatureColor(activeFeature.tabName, 'bg') + ' text-white shadow-md' : 'text-slate-500 hover:bg-white/50'"
                                    class="px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap flex items-center gap-2 shrink-0">
                                <span x-text="status"></span>
                                <span class="bg-white/30 text-current px-1.5 py-0.5 rounded-md text-[9px]" x-text="getCardsByStatus(status).length"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>

     <div class="max-w-7xl mx-auto w-full pb-10">
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-10 max-w-6xl mx-auto w-full">
                
                <template x-for="card in getCardsByStatus(activeStatusFilter)" :key="card[activeFeature.idKey]">
                    
                    <div @click="openModal('edit', card)" class="glass-card relative p-4 rounded-2xl border border-white/60 hover:border-white/80 transition-all duration-300 group overflow-hidden cursor-pointer shadow-sm bg-white/40 backdrop-blur-md">
                        
                        <div class="absolute -top-10 -right-10 w-32 h-32 rounded-full blur-xl group-hover:scale-150 transition-transform duration-500 z-0 opacity-40" :class="getFeatureColor(activeFeature.tabName, 'bg')"></div>
                        
                        <div class="relative z-10 flex flex-col h-full">
                            
                            <div class="flex justify-between items-center mb-3">
                                <span class="bg-gradient-to-r from-white/80 to-white/40 text-[9px] font-extrabold px-2.5 py-1 rounded-lg uppercase tracking-wider shadow-sm border border-white/60 backdrop-blur-sm"
                                      :class="getFeatureColor(activeFeature.tabName, 'text')"
                                      x-text="getCardTag(card)">
                                </span>
                                
                                <div class="text-[9px] font-bold bg-white/60 border border-white/80 rounded-lg outline-none py-1 px-2 shadow-sm flex items-center gap-1.5 capitalize"
                                     :class="card['Status'] === 'To Do' ? 'text-rose-500' : card['Status'] === 'In Progress' ? 'text-amber-500' : 'text-emerald-500'">
                                    <span x-text="card['Status']"></span>
                                    <i class="fa-solid fa-chevron-down text-[7px] opacity-70"></i>
                                </div>
                            </div>
                            
                            <h3 class="font-extrabold text-slate-800 text-[15px] leading-tight mb-1.5 transition-colors pr-2 group-hover:opacity-80" 
                                :class="getFeatureColor(activeFeature.tabName, 'text')"
                                x-text="getCardTitle(card)">
                            </h3>
                            
                            <p class="text-[11px] text-slate-600 mb-3 line-clamp-2 leading-relaxed" x-text="getCardDesc(card)"></p>

                         <!-- Baris 4: Kotak Tanggal (Responsif di Layar HP) -->
                            <!-- Menggunakan flex-col di HP, dan flex-row (berdampingan) di layar sm ke atas -->
                            <div class="flex flex-col sm:flex-row gap-2 sm:gap-4 mb-3 bg-white/40 p-2.5 rounded-xl border border-white/50 shadow-sm" x-show="getCardStartDate(card) || getCardEndDate(card)">
                                
                                <!-- Start Date -->
                                <div class="flex-1 flex flex-row sm:flex-col items-center sm:items-start justify-between sm:justify-start">
                                    <span class="block text-[8px] text-slate-400 font-bold uppercase tracking-widest sm:mb-0.5">Start Date</span>
                                    <span class="text-[10px] font-bold text-slate-700 flex items-center gap-1.5">
                                        <i class="fa-regular fa-calendar" :class="getFeatureColor(activeFeature.tabName, 'text')"></i> 
                                        <span x-text="getCardStartDate(card) ? formatDateFull(getCardStartDate(card)) : '-'"></span>
                                    </span>
                                </div>
                                
                                <!-- Garis Pemisah (Vertikal di Laptop, Horizontal di HP) -->
                                <div class="hidden sm:block w-px bg-white/60 mx-1"></div>
                                <div class="sm:hidden h-px w-full bg-white/60 my-0.5"></div>
                                
                                <!-- End Date -->
                                <div class="flex-1 flex flex-row sm:flex-col items-center sm:items-start justify-between sm:justify-start">
                                    <span class="block text-[8px] text-slate-400 font-bold uppercase tracking-widest sm:mb-0.5">End Date</span>
                                    <span class="text-[10px] font-bold text-slate-700 flex items-center gap-1.5">
                                        <i class="fa-regular fa-calendar-check" :class="getFeatureColor(activeFeature.tabName, 'text')"></i> 
                                        <span x-text="getCardEndDate(card) ? formatDateFull(getCardEndDate(card)) : '-'"></span>
                                    </span>
                                </div>

                            </div>

                            <div class="w-full mb-3" x-show="getCardLink(card)">
                                <div class="w-full text-[11px] font-bold py-2 rounded-lg transition-colors shadow-sm flex justify-center items-center gap-1.5 border"
                                     :class="getFeatureColor(activeFeature.tabName, 'bg') + ' bg-opacity-10 ' + getFeatureColor(activeFeature.tabName, 'text') + ' ' + getFeatureColor(activeFeature.tabName, 'border') + ' hover:bg-opacity-20'">
                                    <i class="fa-solid fa-link"></i> Buka File / Link
                                </div>
                            </div>
                            
                            <div class="flex justify-between items-end border-t border-slate-200/50 pt-2.5 mt-auto">
                                <div class="flex items-center gap-2">
                                    <div class="relative">
                                        <img :src="'https://ui-avatars.com/api/?name=' + getPICName(card) + '&background=random&color=fff&rounded=true&bold=true'" class="w-7 h-7 rounded-full shadow-sm border-2 border-white object-cover">
                                        <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400 border border-white rounded-full"></div>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">PIC</span>
                                        <span class="text-[10px] font-bold text-slate-700 leading-none truncate max-w-[70px]" x-text="getPICName(card)"></span>
                                    </div>
                                </div>
                                
                                <div class="flex flex-col items-end" x-show="getCardExtra(card)">
                                    <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1" x-text="getCardExtra(card)?.label"></span>
                                    <span class="text-slate-600 text-[10px] font-bold bg-white/50 px-2 py-0.5 rounded-md border border-white/40 shadow-sm flex items-center gap-1.5">
                                        <i class="fa-solid fa-hourglass-half text-amber-500/80"></i> 
                                        <span x-text="getCardExtra(card)?.value"></span>
                                    </span>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </template>
                
            </div>
            </div>

            <div x-show="getCardsByStatus(activeStatusFilter).length === 0" class="flex-1 flex flex-col items-center justify-center opacity-70 mt-12 pb-20">
                <div class="w-24 h-24 mb-5 bg-white/40 rounded-full flex items-center justify-center border-4 border-white/50 shadow-sm">
                    <i class="fa-solid fa-folder-open text-4xl text-indigo-300"></i>
                </div>
                <h3 class="text-lg font-extrabold text-slate-700 mb-1">Kategori Kosong</h3>
                <p class="text-xs font-bold text-slate-500">Tidak ada kartu pada status ini.</p>
            </div>
            
        </div>
    </main>

  <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md" x-transition.opacity>
        <div class="glass-panel w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh] border border-white/60 bg-white/40" @click.away="modalOpen = false" x-transition>
            
            <div class="p-7 border-b border-white/50 flex justify-between items-center bg-white/60 shrink-0">
                <h2 class="text-2xl font-extrabold text-slate-800 flex items-center gap-3.5">
                    <div class="w-10 h-10 rounded-full bg-white border border-white/80 flex items-center justify-center shadow-sm">
                        <i :class="activeFeature.icon + ' text-base ' + getFeatureColor(activeFeature.tabName, 'text')"></i>
                    </div>
                    <span x-text="modalMode === 'add' ? 'Tambah Data Baru' : 'Detail & Edit Data'"></span>
                </h2>
                <button @click="modalOpen = false" class="text-slate-500 hover:text-rose-500 w-10 h-10 bg-white rounded-full flex items-center justify-center transition-all hover:shadow-inner"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <div class="p-8 overflow-y-auto bg-white/30" style="scrollbar-width: thin;">
                <form @submit.prevent="submitForm" class="space-y-5">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
                        <template x-for="field in currentHeaders" :key="field">
                            
                            <div x-show="field !== 'ID Tim' && field !== 'Waktu Dibuat' && field !== activeFeature.idKey" class="flex flex-col group">
                                
                                <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-widest mb-2 ml-1.5" x-text="field"></label>
                                
                                <div class="relative w-full">
                                    
                                    <template x-if="field === 'Status'">
                                        <select x-model="formData[field]" required class="w-full glass-input rounded-2xl px-4 py-3.5 font-bold text-indigo-700 text-sm border border-white/80 hover:border-indigo-300 focus:border-transparent focus:ring-0 transition-colors bg-white/40">
                                            <template x-for="stat in activeFeature.boardStatuses" :key="stat">
                                                <option :value="stat" x-text="stat"></option>
                                            </template>
                                        </select>
                                    </template>

                                    <template x-if="field.toLowerCase().includes('deskripsi') || field.toLowerCase().includes('catatan')">
                                        <textarea x-model="formData[field]" rows="4" class="w-full glass-input rounded-2xl px-4 py-3.5 font-medium text-sm border border-white/80 hover:border-indigo-300 focus:border-transparent focus:ring-0 transition-colors bg-white/40"></textarea>
                                    </template>

                                    <template x-if="field.toLowerCase().includes('date') || field.toLowerCase().includes('deadline')">
                                        <input type="datetime-local" x-model="formData[field]" class="w-full glass-input rounded-2xl px-4 py-3.5 font-medium text-sm text-slate-700 border border-white/80 hover:border-indigo-300 focus:border-transparent focus:ring-0 transition-colors bg-white/40">
                                    </template>

    <script>
        // ========================================================
        // KUNCI UTAMA SCRIPT BACKEND & APLIKASI

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMNgov6EUtksI16RuxYu8G2EVUWHYp-9jzBjzvoFaozMzefPrPfo_NussB1e2gqoN34g/exec';

        function workspaceApp() {
            return {
                // Keamanan & Akses
                user: { email: '', idUser: '' },
                idTim: '',

                // State Tampilan
                isSidebarOpen: true,
                isLoading: false,
               isSubmitting: false,
                activeStatusFilter: '', // <--- TAMBAHKAN BARIS INI
                // STATE PROFIL PENGGUNA
                isProfileModalOpen: false,
                isSavingProfile: false,
                userProfile: {
                    namaLengkap: 'Lobi Anwar', // Default awal

                    posisi: 'Product Manager',

                },
                // STATE MULTIPLAYER (REAL-TIME PRESENCE)
                onlineUsers: [],

                mySessionId: 'sess_' + Math.random().toString(36).substr(2, 9),
                // State Modal Dinamis
                modalOpen: false,
                modalMode: 'add',
                formData: {},
                currentHeaders: [], // Akan diisi otomatis oleh nama kolom dari Sheet
                
                // Data Board
                cards: [],

                // Konfigurasi Dinamis 31 Fitur (Sebagian yang utama)
                // Kategori: 1. Agile & Task, 2. CRM & Sales, 3. HR & General
                // Konfigurasi Dinamis 28 Fitur Operasional Lengkap

                menuGroups: [

                            { tabName: "Job_Desk", title: "Job Description", icon: "fa-solid fa-user-tag", idKey: "ID Job Desk", boardStatuses: ["Draft", "Review", "Active"] }
                        ]
                    },
                    {
                        category: "💡 Riset & Konten",
                        items: [
                            { tabName: "Ideas", title: "Ideation Bank", icon: "fa-regular fa-lightbulb", idKey: "ID Ide", boardStatuses: ["Belum Dimulai", "Dikerjakan", "Selesai"] },
                            { tabName: "Research", title: "Research Log", icon: "fa-solid fa-microscope", idKey: "ID Research", boardStatuses: ["Planning", "In Progress", "Completed"] },
                            { tabName: "Product_Program_Dev", title: "Program Development", icon: "fa-solid fa-box-open", idKey: "ID Program", boardStatuses: ["Ideation", "Development", "Launched"] },
                            { tabName: "Competitor_Tracking", title: "Riset Kompetitor", icon: "fa-solid fa-chess-knight", idKey: "ID Competitor", boardStatuses: ["To Research", "Analyzing", "Completed"] },
                            { tabName: "Campaign_Content", title: "Content Campaign", icon: "fa-solid fa-bullhorn", idKey: "ID Campaign", boardStatuses: ["Draft", "Produksi", "Scheduled", "Published"] },
                            { tabName: "Event_Program", title: "Event Management", icon: "fa-solid fa-calendar-check", idKey: "ID Event", boardStatuses: ["Preparation", "Ongoing", "Completed"] }
                        ]
                    },
                    {
                        category: "🤝 CRM & Kemitraan",
                        items: [
                            { tabName: "Leads_Funnel", title: "Leads Funnel", icon: "fa-solid fa-filter", idKey: "ID Lead", boardStatuses: ["Lead In", "Follow Up", "Negosiasi", "Closed Won", "Closed Lost"] },
                            { tabName: "Pipeline_Management", title: "Sales Pipeline", icon: "fa-solid fa-funnel-dollar", idKey: "ID Pipeline", boardStatuses: ["Prospect", "Proposal", "Negotiation", "Closed"] },
                            { tabName: "Client_Management", title: "Client Relations", icon: "fa-solid fa-user-tie", idKey: "ID Client", boardStatuses: ["Onboarding", "Active", "Inactive"] },
                            { tabName: "Partnership", title: "Partnership Deal", icon: "fa-solid fa-handshake", idKey: "ID Partnership", boardStatuses: ["Pendekatan", "Drafting MOU", "Aktif", "Berakhir"] },
                            { tabName: "Collaboration_Team", title: "Team Collaboration", icon: "fa-solid fa-people-arrows", idKey: "ID Collaboration", boardStatuses: ["Planning", "Active", "Completed"] },
                            { tabName: "Outreach_Activity", title: "Outreach Tracker", icon: "fa-solid fa-satellite-dish", idKey: "ID Outreach", boardStatuses: ["Planned", "Contacted", "Responded"] },
                            { tabName: "Follow_Up_Tracker", title: "Follow Up Tracker", icon: "fa-solid fa-reply-all", idKey: "ID Follow Up", boardStatuses: ["To Follow Up", "In Progress", "Done"] }
                        ]
                    },
                    {
                        category: "🗄️ Database & Mapping",
                        items: [
                            { tabName: "Company_Database", title: "Company Database", icon: "fa-solid fa-building", idKey: "ID Company", boardStatuses: ["Prospect", "Partnered", "Archived"] },
                            { tabName: "Community_Database", title: "Community Database", icon: "fa-solid fa-users", idKey: "ID Community", boardStatuses: ["Prospect", "Partnered", "Archived"] },
                            { tabName: "Campus_Database", title: "Campus Database", icon: "fa-solid fa-school", idKey: "ID Campus", boardStatuses: ["Prospect", "Partnered", "Archived"] }
                        ]
                    },
                    {
                        category: "👨‍💼 HR & Legal",
                        items: [
                            { tabName: "Talent_Pool", title: "Talent Pool", icon: "fa-solid fa-id-badge", idKey: "ID Talent", boardStatuses: ["Sourcing", "Interview", "Hired", "Rejected"] },
                            { tabName: "Mentor_Speaker_Database", title: "Mentor & Speaker", icon: "fa-solid fa-microphone-lines", idKey: "ID Speaker", boardStatuses: ["Contacted", "Confirmed", "Completed"] },
                            { tabName: "Proposal_Tracker", title: "Proposal Tracker", icon: "fa-solid fa-file-invoice", idKey: "ID Proposal", boardStatuses: ["Drafting", "Sent", "Approved", "Rejected"] },
                            { tabName: "MoU_Agreement_Tracker", title: "Kontrak & MOU", icon: "fa-solid fa-file-signature", idKey: "ID Agreement", boardStatuses: ["Draft", "Review Legal", "Signed", "Expired"] }
                        ]
                    },
                    {
                        category: "📊 Evaluasi & Performa",
                        items: [
                            { tabName: "Target_Tracking", title: "Target Tracking", icon: "fa-solid fa-bullseye", idKey: "ID Target", boardStatuses: ["On Track", "At Risk", "Achieved", "Missed"] },
                            { tabName: "Performance_Report", title: "Performance Report", icon: "fa-solid fa-chart-line", idKey: "ID Report", boardStatuses: ["Drafting", "Review", "Published"] }
                        ]
                    }
                ],
                // 1. FUNGSI INISIALISASI (Pengecekan Keamanan Ganda)
                async initApp() {
                    const localUser = JSON.parse(localStorage.getItem('notionClone_User') || '{}');
                    const localTeam = localStorage.getItem('notionClone_idTim');

                    // Jika tidak ada akses, tendang kembali ke halaman Login!
                    if (!localUser.emailUser || !localTeam) {
                        window.location.href = "auth.html"; // Ganti dengan nama file login-mu
                        return;
                    }

                  this.user = { email: localUser.emailUser, idUser: localUser.idUser };
                    this.idTim = localTeam;

                    // Set default fitur yang terbuka pertama kali
                    this.activeFeature = this.menuGroups[0].items[0];
                    this.activeStatusFilter = this.activeFeature.boardStatuses[0]; // <--- TAMBAHKAN BARIS INI
                    this.fetchData();
                    this.initPresence();
                    this.startClock();
                },

                // 2. LOGOUT
                logout() {
                    localStorage.removeItem('notionClone_User');
                    localStorage.removeItem('notionClone_idTim');
                    window.location.href = "auth.html";
                },

          switchFeature(featureItem) {
                    if (this.activeFeature.tabName === featureItem.tabName) return;
                    this.activeFeature = featureItem;
                    this.activeStatusFilter = featureItem.boardStatuses[0]; // <--- TAMBAHKAN BARIS INI
                    if(window.innerWidth < 768) this.isSidebarOpen = false;
                    this.fetchData();
                },

                // 4. TARIK DATA DARI DATABASE (GET REQUEST)
     // 4. TARIK DATA DARI DATABASE (DENGAN DETEKSI ERROR)
         // ==========================================
                // MESIN MULTIPLAYER & JEJAK REAL-TIME
                // ==========================================
                
                // Menghasilkan warna unik & tetap berdasarkan nama user
                getAvatarColor(name) {
                    const colors = ['bg-indigo-500', 'bg-fuchsia-500', 'bg-emerald-500', 'bg-rose-500', 'bg-cyan-500', 'bg-amber-500', 'bg-violet-500'];
                    let hash = 0;
                    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                    return colors[Math.abs(hash) % colors.length];
                },

                // Menginisialisasi pelacakan real-time
                initPresence() {
                    // 1. Fungsi untuk melaporkan lokasi kita saat ini
                    const updateMyPresence = () => {
                        const myName = this.userProfile.namaLengkap || 'Guest ' + this.mySessionId.substr(-4);
                        const presenceData = {
                            id: this.user.idUser || this.mySessionId,
                            name: myName,
                            initial: myName.charAt(0).toUpperCase(),
                            color: this.getAvatarColor(myName),
                            location: this.activeFeature ? this.activeFeature.tabName : 'Dashboard',
                            lastSeen: Date.now()
                        };
                        localStorage.setItem('omni_presence_' + this.mySessionId, JSON.stringify(presenceData));
                    };

                    // 2. Fungsi untuk membaca lokasi rekan kerja lain
                    const readPresence = () => {
                        const now = Date.now();
                        const users = [];
                        
                        // Menambahkan bot simulasi agar kamu bisa melihat fiturnya meskipun sendirian
                        users.push({
                            id: 'sim_nabil', name: 'Nabil (Rekan)', initial: 'N', color: 'bg-emerald-500',
                            location: 'Project Planning', lastSeen: now
                        });

                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            if (key.startsWith('omni_presence_')) {
                                try {
                                    const data = JSON.parse(localStorage.getItem(key));
                                    // Jika aktif dalam 10 detik terakhir, masukkan ke daftar online
                                    if (now - data.lastSeen < 10000) {
                                        // Jangan masukkan bot jika sudah ada
                                        users.push(data);
                                    } else {
                                        localStorage.removeItem(key); // Bersihkan jejak user yang sudah offline
                                    }
                                } catch(e) {}
                            }
                        }
                        
                        // Hapus duplikat berdasarkan ID
                        const uniqueUsers = Array.from(new Map(users.map(item => [item.id, item])).values());
                        // Urutkan: Diri sendiri selalu di depan
                        this.onlineUsers = uniqueUsers.sort((a, b) => (a.id === (this.user.idUser || this.mySessionId) ? -1 : 1));
                    };

                    // Jalankan detak jantung (heartbeat) setiap 2 detik
                    updateMyPresence();
                    readPresence();
                    setInterval(() => {
                        updateMyPresence();
                        readPresence();
                    }, 2000);

                    // Reaksi kilat jika ada tab lain yang berpindah fitur
                    window.addEventListener('storage', (e) => {
                        if(e.key && e.key.startsWith('omni_presence_')) readPresence();
                    });
                },
                async fetchData() {
                    this.isLoading = true;
                    this.cards = [];
                    this.currentHeaders = [];

                    try {
                        const response = await fetch(`${SCRIPT_URL}?action=get_features_data&targetTab=${this.activeFeature.tabName}&idTim=${this.idTim}`);
                        const json = await response.json();
                        
                        if(json.status === "success") {
                            this.cards = json.data || [];
                            
                            // Cek apakah backend berhasil membaca Baris 1
                            if (json.headers && json.headers.length > 0) {
                                this.currentHeaders = json.headers;
                            } else {
                                // DETEKSI ERROR: Jika gagal, munculkan peringatan!
                                Swal.fire('Informasi Database', `Baris 1 di tab "${this.activeFeature.tabName}" Google Sheets masih kosong. Silakan isi judul-judul kolomnya di Baris 1 agar form bisa muncul.`, 'warning');
                            }
                        } else {
                            Swal.fire('Akses Ditolak', json.message, 'error');
                        }
                    } catch(e) {
                        console.error(e);
                        Swal.fire('Koneksi Gagal', 'Pastikan URL Apps Script sudah di-deploy dengan Versi Baru.', 'error');
                    } finally {
                        this.isLoading = false;
                    }
                },
                // 5. HELPER RENDER KANBAN
               // 5. HELPER RENDER KANBAN (KOMPONEN DINAMIS)
             // ==========================================
             // ==========================================
                // MESIN JAM DIGITAL REAL-TIME
                // ==========================================
                startClock() {
                    const updateTime = () => {
                        const now = new Date();
                        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

                        const dayName = days[now.getDay()];
                        const date = now.getDate();
                        const monthName = months[now.getMonth()];
                        const year = now.getFullYear();

                        const hours = String(now.getHours()).padStart(2, '0');
                        const minutes = String(now.getMinutes()).padStart(2, '0');
                        const seconds = String(now.getSeconds()).padStart(2, '0');

                        // Format: "Minggu, 31 Mei 2026 • 05:39:44"
                        this.currentTime = `${dayName}, ${date} ${monthName} ${year} • ${hours}:${minutes}:${seconds}`;
                    };
                    updateTime(); // Panggil pertama kali agar tidak kosong 1 detik awal
                    setInterval(updateTime, 1000); // Perbarui setiap 1 detik
                },
                // 5. HELPER RENDER KANBAN (SUPER DINAMIS)
                // ==========================================
                getCardsByStatus(status) {
                    return this.cards.filter(c => c.Status === status);
                },

                // PENDETEKSI JUDUL OTOMATIS (Mencari kolom yang ada kata 'Nama')
                getCardTitle(card) {
                    const titleKey = Object.keys(card).find(k => k.toLowerCase().includes('nama'));
                    return titleKey && card[titleKey] ? card[titleKey] : "Untitled Card";
                },

                // PENDETEKSI DESKRIPSI OTOMATIS
                getCardDesc(card) {
                    const descKey = Object.keys(card).find(k => 
                        k.toLowerCase().includes('deskripsi') || 
                        k.toLowerCase().includes('catatan') ||
                        k.toLowerCase().includes('ruang lingkup') ||
                        k.toLowerCase().includes('tanggung jawab')
                    );
                    return descKey && card[descKey] ? card[descKey] : "Tidak ada deskripsi.";
                },

                // PENDETEKSI TAG/KATEGORI OTOMATIS
                getCardTag(card) {
                    const tagKey = Object.keys(card).find(k => 
                        k.toLowerCase().includes('kategori') || 
                        k.toLowerCase().includes('divisi') ||
                        k.toLowerCase().includes('industri') ||
                        k.toLowerCase().includes('fakultas')
                    );
                    return tagKey && card[tagKey] ? card[tagKey] : this.activeFeature.tabName;
                },

                // PENDETEKSI PIC OTOMATIS
            // PENDETEKSI PIC OTOMATIS (Revisi Tambahan Kata Kunci)
                getPICName(card) {
                    const picKey = Object.keys(card).find(k => 
                        k.toLowerCase().includes('pic') || 
                        k.toLowerCase().includes('pemilik')
                    );
                    return picKey && card[picKey] ? card[picKey] : 'No PIC';
                },

                getPICInitial(card) {
                    const name = this.getPICName(card);
                    return name !== 'No PIC' ? name.charAt(0).toUpperCase() : '?';
                },
            // ==========================================
                // REVISI HELPER TANGGAL & WAKTU (ALAT AGAR KEREN)
                // ==========================================
                
                // Menghasilkan format: "17 November 2024" (Bahasa Indonesia)
                formatDateFull(dateStr) {
                    if(!dateStr) return "Tanggal -";
                    try {
                        const d = new Date(dateStr);
                        if(isNaN(d)) return dateStr;
                        // Format Tanggal Panjang Bahasa Indonesia
                        return d.toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});
                    } catch(e) { return "Tanggal -"; }
                },

                // Menghasilkan format: "10:00"
                formatTime(dateStr) {
                    if(!dateStr) return "Jam -";
                    try {
                        const d = new Date(dateStr);
                        if(isNaN(d)) return dateStr;
                        // Format Jam:Menit 24 Jam
                        return d.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', hour12: false});
                    } catch(e) { return "Jam -"; }
                },
                // PENDETEKSI TANGGAL MULAI & SELESAI
                getCardStartDate(card) {
                    return card['Start Date'] || card['Tanggal Mulai'] || card['Waktu Dibuat'] || null;
                },
                getCardEndDate(card) {
                    return card['End Date'] || card['Tanggal Selesai'] || card['Deadline'] || null;
                },

                // PENDETEKSI LINK & URL
                getCardLink(card) {
                    const linkKey = Object.keys(card).find(k => k.toLowerCase().includes('link') || k.toLowerCase().includes('url'));
                    return linkKey && card[linkKey] ? card[linkKey] : null;
                },

                // PENDETEKSI ESTIMASI / BUDGET / METRIK LAIN
                getCardExtra(card) {
                    const extraKey = Object.keys(card).find(k => k.toLowerCase().includes('estimasi') || k.toLowerCase().includes('budget') || k.toLowerCase().includes('target') || k.toLowerCase().includes('biaya'));
                    return extraKey && card[extraKey] ? { label: extraKey, value: card[extraKey] } : null;
                },

                // SISTEM WARNA BUNGGLON TIAP FITUR
            // ==========================================
                // REVISI SISTEM WARNA BUNGGLON (AURA GLASS EDITION)
                // ==========================================
                getFeatureColor(tabName, type) {
                    const colors = [
                        { bg: 'bg-indigo-400', text: 'text-indigo-600', border: 'border-indigo-400' },
                        { bg: 'bg-emerald-400', text: 'text-emerald-600', border: 'border-emerald-400' },
                        { bg: 'bg-rose-400', text: 'text-rose-600', border: 'border-rose-400' },
                        { bg: 'bg-amber-400', text: 'text-amber-600', border: 'border-amber-400' },
                        { bg: 'bg-fuchsia-400', text: 'text-fuchsia-600', border: 'border-fuchsia-400' },
                        { bg: 'bg-cyan-400', text: 'text-cyan-600', border: 'border-cyan-400' },
                        { bg: 'bg-violet-400', text: 'text-violet-600', border: 'border-violet-400' }
                    ];
                    
                    // Rumus mengubah nama tab menjadi angka urut warna
                    let hash = 0;
                    for (let i = 0; i < tabName.length; i++) {
                        hash = tabName.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const index = Math.abs(hash) % colors.length;
                    
                    return colors[index][type];
                },
                    
             
                formatForInput(dateStr) {
                    if (!dateStr) return "";
                    try {
                        const d = new Date(dateStr);
                        if (isNaN(d)) return dateStr;
                        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    } catch(e) { return ""; }
                },

                // 6. MODAL CONTROL (DYNAMIC)
                openModal(mode, cardData = null) {
                    this.modalMode = mode;
                    this.formData = {};

                    if(mode === 'add') {
                        // Set nilai default form
                        this.currentHeaders.forEach(h => { this.formData[h] = ""; });
                        this.formData['Status'] = this.activeFeature.boardStatuses[0]; // Set status ke kolom paling pertama
                    } else if (mode === 'edit' && cardData) {
                        // Salin data lama, lalu format ulang tanggalnya agar bisa masuk ke input datetime-local
                        for (let key in cardData) {
                            if(key.toLowerCase().includes('date') || key.toLowerCase().includes('deadline')) {
                                this.formData[key] = this.formatForInput(cardData[key]);
                            } else {
                                this.formData[key] = cardData[key];
                            }
                        }
                    }
                    this.modalOpen = true;
                },
// FUNGSI SIMPAN PROFIL
        // REVISI: FUNGSI SIMPAN PROFIL REAL-TIME KE GOOGLE SHEETS
          // ==========================================
                // FITUR PROFIL (SINKRON DENGAN TAB 'PROFILES')
                // ==========================================
                
                // 1. Tarik Data Profil (Anti-Error jika user baru)
                async fetchUserProfile() {
                    try {
                        const response = await fetch(`${SCRIPT_URL}?action=get_user_profile&idUser=${this.user.idUser}`);
                        const json = await response.json();
                        
                        // Cek apakah data sukses ditarik DAN tidak kosong
                        if (json.status === 'success' && Object.keys(json.data).length > 0) {
                            this.userProfile.namaLengkap = json.data['Nama Lengkap'] || this.user.email.split('@')[0];
                            this.userProfile.username = json.data['Username'] || 'user';
                            this.userProfile.avatar = json.data['Avatar'] || '';
                            this.userProfile.bio = json.data['Bio'] || '';
                            this.userProfile.posisi = json.data['Posisi'] || 'Member';
                            this.userProfile.tema = json.data['Tema'] || 'light';
                        } else {
                            // Jika User Baru (Belum ada di database), panggil nama dari email
                            this.userProfile.namaLengkap = this.user.email ? this.user.email.split('@')[0] : 'User';
                        }
                    } catch (e) {
                        console.error("Gagal memuat profil:", e);
                    }
                },

                // 2. Simpan Data Profil
            // 2. Simpan Data Profil (Versi Anti-CORS)
              // ==========================================
                // FUNGSI SIMPAN PROFIL (ULTIMATE & ANTI-CORS)
                // ==========================================
                async saveProfile() {
                    // 1. Tutup modal SECARA INSTAN agar UI terasa sangat cepat
                    this.isProfileModalOpen = false;

                    // 2. Munculkan Toast bahwa sistem sedang bekerja diam-diam
                    Swal.mixin({
                        toast: true, position: 'top-end', showConfirmButton: false, timer: 2500,
                        customClass: { popup: 'rounded-2xl bg-white/95 backdrop-blur-md border border-indigo-500/30 shadow-xl p-4 flex items-center z-[9999]' }
                    }).fire({
                        icon: 'info',
                        title: '<span class="text-sm font-extrabold text-slate-800 ml-2">Menyimpan profil...</span>'
                    });

                    // 3. Gunakan URLSearchParams (Format yang disukai Google)
                    const payload = new URLSearchParams();
                    payload.append('action', 'update_user_profile');
                    payload.append('idUser', this.user.idUser);
                    payload.append('namaLengkap', this.userProfile.namaLengkap);
                    payload.append('username', this.userProfile.username);
                    payload.append('avatar', this.userProfile.avatar);
                    payload.append('bio', this.userProfile.bio);
                    payload.append('posisi', this.userProfile.posisi);
                    payload.append('tema', this.userProfile.tema);

                    // 4. Tembak ke Server dengan mode NO-CORS
                    try {
                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: payload,
                            mode: 'no-cors' // <-- INI YANG MEMBUNUH ERROR CORS
                        });

                        // Karena kita pakai 'no-cors', kita beri jeda 2.5 detik lalu Refresh Profilnya!
                        setTimeout(async () => {
                            await this.fetchUserProfile(); // Tarik data profil terbaru
                            
                            // Munculkan notifikasi Berhasil
                            Swal.mixin({
                                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                                customClass: { popup: 'rounded-2xl bg-white/95 backdrop-blur-md border border-emerald-500/30 shadow-xl p-4 flex items-center z-[9999]' }
                            }).fire({
                                icon: 'success',
                                title: '<span class="text-sm font-extrabold text-slate-800 ml-2">Profil berhasil diperbarui!</span>'
                            });
                        }, 2500);

                    } catch (error) {
                        console.error("Error Simpan Profil:", error);
                        Swal.fire('Koneksi Terputus', 'Gagal mengirim data. Pastikan internet Anda stabil.', 'error');
                    }
                },
                // 7. SUBMIT FORM KE BACKEND DENGAN AUDIT LOG
              
                async submitForm() {
                    this.isSubmitting = true;
                    
                    const payload = new URLSearchParams();
                    // Mode 'add' menggunakan action 'add_card', Mode 'edit' menggunakan 'update_card'
                    const actionType = this.modalMode === 'add' ? 'add_card' : 'update_card';
                    
                   payload.append('action', actionType);
                    payload.append('targetTab', this.activeFeature.tabName);
                    payload.append('idTim', this.idTim); // Ini untuk dibaca oleh sistem Backend
                    payload.append('ID Tim', this.idTim); // INI KUNCINYA: Untuk mengisi kolom 'ID Tim' di Google Sheets!
                    payload.append('idUser', this.user.idUser);
                    
                    if(this.modalMode === 'edit') {
                        payload.append('idData', this.formData[this.activeFeature.idKey]);
                    }

                    // Append semua field isian user
                    for (let key in this.formData) {
                        payload.append(key, this.formData[key]);
                    }

                    try {
                        const response = await fetch(SCRIPT_URL, { method: 'POST', body: payload });
                        const json = await response.json();
                        
                       if(json.status === 'success') {
    Swal.fire({
        title: 'Berhasil!',
        text: json.message,
        iconHtml: '<i class="fa-solid fa-check"></i>',
        customClass: {
            popup: 'rounded-3xl',
            icon: 'custom-swal-success-icon'
        },
        timer: 1500,
        showConfirmButton: false
    });

    this.modalOpen = false;
    this.fetchData(); // Muat ulang data terbaru
} else {
    Swal.fire('Gagal', json.message, 'error');
}
                    } catch(e) {
                        Swal.fire('Error', 'Gagal menghubungi server database.', 'error');
                    } finally {
                        this.isSubmitting = false;
                    }
                }
            
            }
        }
    </script>
</body>
